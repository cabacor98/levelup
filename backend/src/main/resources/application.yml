spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/levelupdb}
    username: ${SPRING_DATASOURCE_USERNAME:levelup}
    password: ${SPRING_DATASOURCE_PASSWORD:levelup123}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dominio.us.auth0.com/

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: info


auth0:
  domain: "dominio"
  client-id: client_id
  client-secret: secret_id
  audience: audience

  